services:
  users-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"

  products-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: products_db
    ports:
      - "5433:5432"

  orders-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: orders_db
    ports:
      - "5434:5432"

  payments-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: payments_db
    ports:
      - "5435:5432"

  auth-service:
    build: backend/auth-service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend/auth-service:/app
    environment:
      USE_POSTGRES: "1"
      DB_HOST: users-db
      DB_PORT: 5432
      DB_NAME: users_db
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      SECRET_KEY: django-insecure-shared-microservices-secret-key-change-in-production
    depends_on:
      - users-db
    ports:
      - "8000:8000"

  products-service:
    build: backend/products-service
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./backend/products-service:/app
    environment:
      USE_POSTGRES: "1"
      DB_HOST: products-db
      DB_PORT: 5432
      DB_NAME: products_db
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      SECRET_KEY: django-insecure-shared-microservices-secret-key-change-in-production
      INTERNAL_SERVICE_TOKEN: desd-internal-service-token
    depends_on:
      - products-db
    ports:
      - "8001:8001"

  orders-service:
    build: backend/orders-service
    command: python manage.py runserver 0.0.0.0:8002
    volumes:
      - ./backend/orders-service:/app
    environment:
      USE_POSTGRES: "1"
      DB_HOST: orders-db
      DB_PORT: 5432
      DB_NAME: orders_db
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      SECRET_KEY: django-insecure-shared-microservices-secret-key-change-in-production
      PRODUCTS_SERVICE_URL: http://products-service:8001/api/products/
      INTERNAL_SERVICE_TOKEN: desd-internal-service-token
    depends_on:
      - orders-db
    ports:
      - "8002:8002"

  payment-service:
    build: backend/payment-service
    command: python manage.py runserver 0.0.0.0:8003
    volumes:
      - ./backend/payment-service:/app
    environment:
      USE_POSTGRES: "1"
      DB_HOST: payments-db
      DB_PORT: 5432
      DB_NAME: payments_db
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      SECRET_KEY: django-insecure-shared-microservices-secret-key-change-in-production
      ORDERS_SERVICE_URL: http://orders-service:8002/api/orders/
    depends_on:
      - payments-db
    ports:
      - "8003:8003"

  frontend:
    build: frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  nginx-gateway:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - products-service
      - orders-service
      - payment-service
      - frontend
