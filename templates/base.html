<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}BRFN{% endblock %}</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto;
      margin: 0;
      background: #f8fafc;
      color: #1e293b;
    }

    .nav {
      display: flex;
      gap: 18px;
      align-items: center;
      padding: 16px 28px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
    }

    .nav strong {
      color: #16a34a;
      font-size: 20px;
    }

    .nav a {
      text-decoration: none;
      color: #475569;
      font-weight: 500;
    }

    .nav a:hover {
      color: #16a34a;
    }

    .wrap {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    }

    h1 {
      margin-top: 0;
      color: #0f172a;
    }

    h2 {
      color: #16a34a;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 18px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #16a34a;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #15803d;
    }

    pre {
      background: #f1f5f9;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      border: 1px solid #e2e8f0;
    }

    hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 24px 0;
    }
  </style>
</head>
<body>

  <div class="nav">
    <strong>BRFN</strong>
    <span style="opacity:.6;">Digital Marketplace</span>
    <span style="flex:1"></span>
    <a href="/">Home</a>
    <a href="/payments/">Payments</a>
    <a href="/admin/">Admin</a>
  </div>

  <div class="wrap">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
