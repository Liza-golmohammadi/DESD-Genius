services:
  backend:
    build: ./backend
    container_name: backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=backend.settings
      - JWT_ACCESS_MINUTES=15
      - JWT_REFRESH_DAYS=30
      - DB_NAME=mydatabase
      - DB_USER=mydatabaseuser
      - DB_PASSWORD=mypassword
      - DB_HOST=db
      - DB_PORT=5432
      # Stripe test-mode keys — used by the backend to process payments
      - STRIPE_SECRET_KEY=sk_test_51TUCDRHSmtwzhAJs4zk3WU2txJbpxUxYBUMnIUf8mZAagt8jCCV7tdrMLY69ndZnIhIXhzz98HrLsgTR0SM0qOhN00m9k5SyDE
      - STRIPE_PUBLISHABLE_KEY=pk_test_51TUCDRHSmtwzhAJskhfgOciUJcMWKdxYDqCMp3lmSK1mHNgDTub6lYK8HbPkykCRaHFF8uogugrtyZ40eU9uI4Ux00uY8vGWhp
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://127.0.0.1:8000
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=mydatabaseuser
      - POSTGRES_PASSWORD=mypassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mydatabaseuser -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
