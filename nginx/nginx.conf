upstream auth-service {
    server auth-service:8000;
}

upstream products-service {
    server products-service:8001;
}

upstream orders-service {
    server orders-service:8002;
}

upstream payment-service {
    server payment-service:8003;
}

server {
    listen 80;

    # Auth service — matches Django URL prefix api/auth_service/
    location /api/auth_service/ {
        proxy_pass http://auth-service;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Products service — matches Django URL prefix api/products/
    location /api/products/ {
        proxy_pass http://products-service;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Orders service — matches Django URL prefix api/orders/
    location /api/orders/ {
        proxy_pass http://orders-service;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Payment service — matches Django URL prefix api/payments/
    location /api/payments/ {
        proxy_pass http://payment-service;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Frontend — catch-all
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;

        # WebSocket support for Vite dev server HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
